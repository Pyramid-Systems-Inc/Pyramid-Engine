name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: pwsh
        run: cmake --preset vs2022-debug-tests

      - name: Build
        shell: pwsh
        run: cmake --build --preset build-debug-tests-clean

      - name: Test
        shell: pwsh
        run: ctest --preset test-debug

